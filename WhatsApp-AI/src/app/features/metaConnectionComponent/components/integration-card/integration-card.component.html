<div class="integration-card" [class]="'platform-' + platform">
  <div class="card-glow"></div>

  <div class="card-top">
    <div class="platform-icon-wrap">
      <i [class]="icon"></i>
    </div>
    <p-tag [value]="statusLabel" [severity]="statusSeverity"></p-tag>
  </div>

  <div class="card-body">
    <h3 class="platform-name">{{ title }}</h3>
    <p class="platform-desc">{{ description }}</p>
  </div>

  <div class="card-footer">
    <button
      pButton
      type="button"
      [label]="actionLabel"
      [loading]="isBusy"
      [outlined]="status === 'connected'"
      [severity]="status === 'connected' ? 'danger' : 'success'"
      class="w-100 action-btn"
      (click)="onPrimaryAction()"
    ></button>
  </div>
</div>
